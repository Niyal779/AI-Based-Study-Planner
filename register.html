<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register - AI-Based Study Planner</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <form id="registerForm" class="auth-card glass">
      <a class="auth-brand" href="index.html">AI Study Planner</a>
      <h2>Create Account</h2>
      <p class="muted">Start with a clean plan for your exams and weak subjects.</p>
      <label>Full Name<input type="text" id="fullname" required></label>
      <label>Email<input type="email" id="email" required></label>
      <label>Password<input type="password" id="password" required></label>
      <button type="submit" class="btn primary">Register</button>
      <p class="muted">Already have an account? <a href="login.html">Login</a></p>
    </form>
  </div>

  <footer class="footer">
    <p>© 2026 AI-Based Study Planner. All Rights Reserved.</p>
    <p>
        Design & Developed by 
        <a href="https://niyal.netlify.app/" target="_blank">
            Niyal Rahaman
        </a>
    </p>
  </footer>

  <script src="js/auth.js"></script>
</body>
</html>
