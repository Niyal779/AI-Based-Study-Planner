<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Settings - AI-Based Study Planner</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar glass">
      <a class="brand" href="dashboard.html">AI Study</a>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="planner.html">Planner</a>
        <a href="analytics.html">Analytics</a>
        <a href="settings.html" class="active">Settings</a>
      </nav>
    </aside>
    <main class="main">
      <header class="main-header">
        <div>
          <p class="eyebrow">Personal workspace</p>
          <h2>Settings</h2>
        </div>
      </header>
      <section class="card">
        <h3>Appearance</h3>
        <label class="toggle-row">Dark Mode<input id="darkMode" type="checkbox"></label>
      </section>

      <section class="card">
        <h3>Study Preferences</h3>
        <form id="settingsForm">
          <label>Daily Study Hours<input id="settingsDailyHours" type="number" min="1" max="12" value="3"></label>
          <label>GPA Target<input id="gpaTarget" type="number" min="0" max="4" step="0.01" value="3.80"></label>
          <label class="toggle-row">Reminders<input id="reminders" type="checkbox" checked></label>
          <button class="btn primary" type="submit">Save Settings</button>
        </form>
      </section>

      <section class="card">
        <h3>Account</h3>
        <p id="accountEmail">demo@study.app</p>
        <button id="logout" class="btn ghost">Logout</button>
      </section>
    </main>
  </div>

  <footer class="footer">
    <p>© 2026 AI-Based Study Planner. All Rights Reserved.</p>
    <p>
        Design & Developed by 
        <a href="https://niyal.netlify.app/" target="_blank">
            Niyal Rahaman
        </a>
    </p>
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
