<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - AI-Based Study Planner</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <form id="loginForm" class="auth-card glass">
      <a class="auth-brand" href="index.html">AI Study Planner</a>
      <h2>Login</h2>
      <p class="muted">Welcome back. Your next study session is waiting.</p>
      <label>Email<input type="email" id="email" required></label>
      <label>Password<input type="password" id="password" required></label>
      <button type="submit" class="btn primary">Login</button>
      <p class="demo-note">Demo: demo@study.app / password</p>
      <p class="muted">Don't have an account? <a href="register.html">Register</a></p>
    </form>
  </div>

  <footer class="footer">
    <p>© 2026 AI-Based Study Planner. All Rights Reserved.</p>
    <p>
        Design & Developed by 
        <a href="https://niyal.netlify.app/" target="_blank">
            Niyal Rahaman
        </a>
    </p>
  </footer>

  <script src="js/auth.js"></script>
</body>
</html>
